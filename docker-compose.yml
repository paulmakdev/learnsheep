services:
  postgres:
    image: postgres:15
    container_name: learnsheep_postgres
    environment:
      POSTGRES_USER: learnsheep_user
      POSTGRES_PASSWORD: learnsheep_password
      POSTGRES_DB: learnsheep_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U learnsheep_user -d learnsheep_db']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: learnsheep_redis
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    container_name: learnsheep_backend
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/app  # Hot reload in dev

volumes:
  postgres_data:
