version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: learnsheep_postgres
    environment:
      POSTGRES_USER: learnsheep_user
      POSTGRES_PASSWORD: learnsheep_password
      POSTGRES_DB: learnsheep_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: learnsheep_redis
    ports:
      - '6379:6379'

volumes:
  postgres_data:
